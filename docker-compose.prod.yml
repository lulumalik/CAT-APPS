services:
  app:
    build: .
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - composer_cache:/root/.composer/cache
    ports:
      - "9000:9000"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_CHANNEL: errorlog
      APP_URL: https://cat-platform.web.id
      DB_CONNECTION: mysql
      DB_HOST: 172.17.0.1
      DB_PORT: 3306
      DB_DATABASE: cat_apps
      DB_USERNAME: cat_user
      DB_PASSWORD: secret

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app

  vite-build:
    image: node:20-alpine
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    command: >
      sh -c "
      npm ci &&
      npm run build
      "

volumes:
  composer_cache:
