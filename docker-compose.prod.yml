services:
  app:
    build: .
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - composer_cache:/root/.composer/cache
    ports:
      - "9000:9000"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_CHANNEL: errorlog
      APP_URL: https://cat-platform.web.id
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
    command: >
      sh -c "
      php -r 'file_exists(\"database/database.sqlite\") || touch(\"database/database.sqlite\");' &&
      php artisan migrate --force &&
      php-fpm
      "

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app

  vite-build:
    image: node:20-alpine
    restart: "no"
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    command: >
      sh -c "
      npm install &&
      npm install @rollup/rollup-linux-x64-musl lightningcss-linux-x64-musl @tailwindcss/oxide-linux-x64-musl -D --force &&
      npm run build
      "

volumes:
  composer_cache:
