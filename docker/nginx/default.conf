resolver 127.0.0.11 valid=10s ipv6=off;

upstream php_upstream {
    zone php_upstream 64k;
    server app:9000 resolve;
}

server {
    listen 80;
    server_name cat-platform.web.id;

    root /var/www/html/public;
    index index.php index.html;

    # Log untuk mempermudah debugging
    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php_upstream;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        
        # Tambahan untuk mematikan PHP configuration yang mungkin di-inject
        fastcgi_param PHP_VALUE "auto_prepend_file= \n auto_append_file= \n allow_url_include=Off";
    }

    location ~ /\.ht {
        deny all;
    }
}
