services:
  app:
    build: .
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - composer_cache:/root/.composer/cache
    ports:
      - "9000:9000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_CHANNEL: errorlog
      APP_URL: http://103.76.120.29
      DB_CONNECTION: mysql
      DB_HOST: host.docker.internal
      DB_PORT: 3306
      DB_DATABASE: cat_apps
      DB_USERNAME: cat_user
      DB_PASSWORD: secret
    profiles: ["prod"]

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app

  app-dev:
    build: .
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - composer_cache:/root/.composer/cache
    ports:
      - "9000:9000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      APP_ENV: dev
      APP_DEBUG: "true"
      LOG_CHANNEL: errorlog
      APP_URL: https://cat-platform.web.id
      DB_CONNECTION: mysql
      DB_HOST: host.docker.internal
      DB_PORT: 3306
      DB_DATABASE: cat_apps
      DB_USERNAME: cat_user
      DB_PASSWORD: secret
    profiles: ["dev"]
    command: php artisan serve --host=0.0.0.0 --port=9000
  vite:
    image: node:20-alpine
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "5173:5173"
    environment:
      VITE_HOST: 0.0.0.0
      CHOKIDAR_USEPOLLING: "true"
    profiles: ["dev"]
    command: >
      sh -c "
      npm install &&
      npm run dev -- --host
      "
  vite-build:
    image: node:20-alpine
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    profiles: ["prod"]
    command: >
      sh -c "
      npm ci &&
      npm run build
      "

volumes:
  composer_cache:
