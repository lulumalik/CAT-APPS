services:
  app:
    build: .
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - composer_cache:/root/.composer/cache
    ports:
      - "9000:9000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      LOG_CHANNEL: stack
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: host.docker.internal
      DB_PORT: 3306
      DB_DATABASE: cat_apps
      DB_USERNAME: cat_user
      DB_PASSWORD: secret
    command: php artisan serve --host=0.0.0.0 --port=9000

  vite:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - /var/www/html/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_HOST: 0.0.0.0
      CHOKIDAR_USEPOLLING: "true"
    command: >
      sh -c "
      npm install &&
      npm run dev -- --host
      "

volumes:
  composer_cache:
